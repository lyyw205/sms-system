action: auto_assign_button_with_booking_skip (자동 배정 — booking_count>1 스킵 포함)
description: |
  자동 배정 버튼 클릭 케이스 중 booking_count>1 인 예약이 섞여 있어
  auto_assign.booking_count_skipped 가 함께 발생하는 변형 경로.
  기본 흐름은 auto-assign-button.yaml 과 동일하며, 스킵 이벤트가 추가된다.

reference_commit: d15eeb8
reference_case: 2026-04-27 로그 req=xxtzlah7 (booking_count_skipped × 28)
created_at: 2026-04-27
confidence: draft
promotion_threshold: 3

preconditions:
  user_action: 자동 배정 버튼 클릭
  has_booking_count_gt1: true   # booking_count>1 예약이 1건 이상 섞여 있음

expected_trace:
  - event: request.enter
    category: MANDATORY
    fields:
      method: POST
      path: /api/rooms/auto-assign
      action_prefix: auto_assign_button

  - event: rooms.manual_auto_assign_trigger
    category: MANDATORY

  - event: auto_assign.enter
    category: MANDATORY
    fields:
      created_by: admin

  - event: assign_room.enter
    category: VARIABLE_COUNT
    min: 0

  - event: assign_room.exit
    category: VARIABLE_COUNT
    min: 0

  - event: auto_assign.booking_count_skipped
    category: VARIABLE_COUNT
    min: 1   # booking_count>1 예약 수 × 스케줄 수만큼 반복 가능
    fields:
      reservation_id: "*"
      booking_count: "*"   # 2 이상
      date: "*"

  - event: activity_log.created
    category: MANDATORY
    fields:
      type: room_assign
      created_by: admin

  - event: auto_assign.exit
    category: MANDATORY
    fields:
      candidates: "*"
      assigned: "*"
      failed: "*"

  - event: request.exit
    category: MANDATORY
    fields:
      status: 200

forbidden_events:
  - event: cascade.clamped_to_today
    reason: 자동 배정은 cascade 와 무관한 신규 배정 경로

notes: |
  - 같은 reservation_id 가 스케줄 수만큼 중복 로깅될 수 있음 — VARIABLE_COUNT 로 모델링.
  - booking_count_skipped × 28 은 reservation 수 × 활성 스케줄 수의 곱으로 추정.
  - 기본 성공/실패 assign_room 사이클은 auto-assign-button.yaml 과 동일.
