action: job_sync_unstable_reservations (불안정 예약 동기화 cron)
description: |
  12시간 간격 cron. 상태가 불안정한 예약을 감지해 재동기화 시도.
  enter/exit 이벤트가 쌍으로 발생하며, 수치 필드는 실행 시점마다 다르다.

reference_session: 2026-04-24
created_at: 2026-04-27
confidence: draft
promotion_threshold: 3

preconditions:
  cron_trigger: true   # 12시간 간격 — request.enter/exit 없음

expected_trace:
  - event: job.sync_unstable_reservations.enter
    category: MANDATORY
    fields:
      tenant_count: "*"
      req: "-"

  - event: job.sync_unstable_reservations.exit
    category: MANDATORY
    fields:
      active_tenants: "*"
      total_added: "*"
      total_updated: "*"
      total_synced: "*"
      req: "-"

forbidden_events:
  - event: request.enter
    reason: cron 기반 경로 — HTTP 요청 없음

notes: |
  - total_added / total_updated / total_synced 는 실행 결과에 따라 0 이상.
  - tenant_failed 변형은 별도 pending 항목으로 관리.
