action: drag_guest_to_room (1박 손님, 오늘 셀 드롭)
description: |
  check_in=today, check_out=today+1 인 단박자를 오늘 테이블에서 다른 방으로
  드래그. 정상 경로: 가드 미발동, 단일 날짜 INSERT.

reference_commit: 0ec7084
reference_case: req=raf7932i, res=3918, 2026-04-21 13:32:07
created_at: 2026-04-21

preconditions:
  reservation:
    is_long_stay: false
    check_in: today
    check_out: today+1
  user_action: 드래그 (오늘 테이블에서 다른 방으로)
  apply_subsequent: true

expected_trace:
  - event: request.enter
    category: MANDATORY
    fields:
      method: PUT
      path: /api/reservations/*/room
      action_prefix: drag_guest_to_room

  - event: assign_room.enter
    category: MANDATORY
    fields:
      from_date: today
      end_date: today+1
      dates_count: 1
      is_dorm: false
      assigned_by: manual

  - event: activity_log.created
    category: MANDATORY
    fields:
      type: room_move
      status: success

  - event: reconcile_chips_for_reservation.enter
    category: MANDATORY

  - event: filter.apply.enter
    category: VARIABLE_COUNT
    min: 1

  - event: filter.applied
    category: VARIABLE_COUNT
    min: 1

  - event: filter.apply.exit
    category: VARIABLE_COUNT
    min: 1

  - event: reconcile_chips_for_reservation.exit
    category: MANDATORY

  - event: surcharge.reconcile.enter
    category: MANDATORY
    fields:
      date: today

  - event: assign_room.exit
    category: MANDATORY
    fields:
      created: 1
      pushed_count: 0

  - event: request.exit
    category: MANDATORY
    fields:
      status: 200

forbidden_events:
  - event: cascade.clamped_to_today
    reason: from_date=today 라 past 조건 미충족
  - event: double_booking.pushed_out
    reason: 이 케이스에선 빈 방으로의 드래그라 밀어내기 없음 (밀어내기 발생하면 CONDITIONAL 로 분리 필요)
