version: '3.8'

services:
  backend:
    image: ghcr.io/stablehq/handam/backend:latest
    container_name: handam-backend
    restart: unless-stopped
    env_file:
      - .env.production
    environment:
      - TZ=Asia/Seoul
      # DIAG v2: off | critical | verbose
      # 평상시 off, 수정 직후 3-5일만 verbose, 이후 critical 또는 off
      - DIAG_LEVEL=verbose
      - DIAG_LOG_DIR=/app/logs
    ports:
      - "127.0.0.1:8000:8000"
    volumes:
      - ./backend/logs:/app/logs
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "5"

  frontend:
    image: ghcr.io/stablehq/handam/frontend:latest
    container_name: handam-frontend
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    depends_on:
      backend:
        condition: service_healthy
    volumes:
      - ./certbot/conf:/etc/letsencrypt:ro
      - ./certbot/www:/var/www/certbot:ro
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "5"

  certbot:
    image: certbot/certbot
    container_name: handam-certbot
    restart: unless-stopped
    volumes:
      - ./certbot/conf:/etc/letsencrypt
      - ./certbot/www:/var/www/certbot
    entrypoint: "/bin/sh -c 'trap exit TERM; while :; do certbot renew; sleep 12h; done'"
